services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-matchcast}
      POSTGRES_USER: ${POSTGRES_USER:-matchcast}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - matchcast-db:/var/lib/postgresql/data
  api:
    build: .
    environment:
      MATCHCAST_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-matchcast}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-matchcast}
      MATCHCAST_MAX_SIMULATIONS: ${MATCHCAST_MAX_SIMULATIONS:-10000}
      MATCHCAST_LOG_LEVEL: ${MATCHCAST_LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MATCHCAST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5
volumes:
  matchcast-db:
